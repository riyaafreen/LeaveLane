
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Leave - LeaveLane</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=ranade@400,600,800&display=swap" rel="stylesheet">
    
    <style>
        :root { --brand-green: #6BB62D; --deep-green: #1b4332; --bg: #f2ede0; --glow: 0 0 15px rgba(107, 182, 45, 0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #1a2420; min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }
        
        /* --- BACKGROUND --- */
        .bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .bg-grid { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background-image: linear-gradient(to right, rgba(27, 67, 50, 0.06) 1px, transparent 1px), linear-gradient(to bottom, rgba(27, 67, 50, 0.06) 1px, transparent 1px); background-size: 50px 50px; transform: rotate(-12deg); animation: gridShift 8s linear infinite; }
        .tiny-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; z-index: -1; }
        .blob-1 { width: 300px; height: 300px; background: rgba(107, 182, 45, 0.4); top: 10%; left: 10%; animation: driftBlob1 20s infinite ease-in-out alternate; }
        .blob-2 { width: 250px; height: 250px; background: rgba(45, 106, 79, 0.3); bottom: 10%; right: 10%; animation: driftBlob2 25s infinite ease-in-out alternate; }

        /* --- HEADER --- */
        header { display: flex; justify-content: space-between; padding: 25px 60px; align-items: center; width: 100%; max-width: 1400px; margin: 0 auto; z-index: 10; }
        .brand-wrapper { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; color: var(--deep-green); }
        .header-logo { width: 26px; height: 26px; color: var(--brand-green); }
        .small-title { font-family: 'Ranade', sans-serif; font-size: 20px; font-weight: 800; }
        .small-title span { font-style: italic; color: var(--brand-green); }
        .btn-dashboard { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(27,67,50,0.1); padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--deep-green); text-decoration: none; transition: all 0.3s; }
        .btn-dashboard:hover { border-color: var(--brand-green); box-shadow: var(--glow); background: var(--brand-green); color: white; }

        /* --- LENGTHIER FORM LAYOUT --- */
        .page-wrapper { width: 100%; max-width: 750px; margin: 20px auto; padding: 0 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .header-text { text-align: center; margin-bottom: 20px; }
        .header-text h1 { font-family: 'Ranade', sans-serif; font-size: 38px; }
        
        .form-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-radius: 20px; padding: 40px 50px 30px 50px; box-shadow: 0 15px 35px rgba(27, 67, 50, 0.04); }
        
        .form-group { margin-bottom: 22px; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: #64746a; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(27, 67, 50, 0.15); font-size: 15px; outline: none; transition: all 0.3s ease; }
        input:focus, select:focus, textarea:focus { border-color: var(--brand-green); box-shadow: var(--glow); }
        textarea { height: 130px; resize: vertical; }

        /* --- DYNAMIC DURATION DISPLAY --- */
        .duration-display { background: rgba(107, 182, 45, 0.1); border: 1px solid rgba(107, 182, 45, 0.2); padding: 14px 18px; border-radius: 12px; margin-bottom: 22px; display: none; justify-content: space-between; align-items: center; font-size: 13px; color: var(--deep-green); transition: all 0.3s ease; }
        .duration-display strong { font-size: 16px; font-family: 'Ranade', sans-serif; font-weight: 800; }

        /* --- BUTTONS --- */
        .btn-row { display: flex; gap: 20px; margin-top: 20px; }
        .btn { flex: 1; padding: 16px; border-radius: 12px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.3s ease; }
        .btn-submit { background: var(--deep-green); color: white; }
        .btn-cancel { background: #f8f9fa; color: #55635a; border-color: rgba(27, 67, 50, 0.1); }
        .btn:hover:not(:disabled) { border-color: var(--brand-green); box-shadow: var(--glow); }
        .btn-submit:hover:not(:disabled) { background: var(--brand-green); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        @keyframes gridShift { 0% { background-position: 0px 0px; } 100% { background-position: 50px 50px; } }
        @keyframes driftBlob1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(100px, 50px); } }
        @keyframes driftBlob2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-100px, -50px); } }
    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="tiny-blob blob-1"></div>
    <div class="tiny-blob blob-2"></div>
    <div class="bg-grid"></div>
</div>

<header>
    <a href="index.html" class="brand-wrapper">
        <svg class="header-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <div class="small-title">Leave<span>Lane</span></div>
    </a>
    <a href="dashboard.html" class="btn-dashboard">← Back to Dashboard</a>
</header>

<main class="page-wrapper">
    <div class="header-text">
        <h1>Request Absence</h1>
        <p>Submit your timeline to HR for approval and allocation.</p>
    </div>
    <div class="form-card">
        <form id="leaveForm">
            <div class="form-group">
                <label>ABSENCE CATEGORY</label>
                <select id="leaveType" required>
                    <option value="" disabled selected>Select category...</option>
                    <option value="PTO">Paid Time Off (PTO)</option>
                    <option value="Sick">Medical / Sick Leave</option>
                    <option value="Casual">Casual Leave</option>
                </select>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group"><label>START DATE</label><input type="date" id="startDate" required></div>
                <div class="form-group"><label>END DATE</label><input type="date" id="endDate" required></div>
            </div>

            <div id="durationDisplay" class="duration-display">
                <span>Total Leave Duration:</span>
                <strong id="daysCount">0 Days</strong>
            </div>

            <div class="form-group">
                <label>REASON / COMMENTS</label>
                <textarea id="reason" placeholder="Please provide brief details regarding your request..." required></textarea>
            </div>
            
            <div class="btn-row">
                <button type="button" class="btn btn-cancel" onclick="location.href='dashboard.html'">Cancel</button>
                <button type="submit" class="btn btn-submit" id="submitBtn">Submit Leave Request</button>
            </div>
        </form>
    </div>
</main>

<script>
    // Security Check
    if(sessionStorage.getItem("role") !== "EMPLOYEE"){
        window.location.href = "login.html";
    }

    const startDateInput = document.getElementById('startDate');
    const endDateInput = document.getElementById('endDate');
    const durationDisplay = document.getElementById('durationDisplay');
    const daysCount = document.getElementById('daysCount');
    const submitBtn = document.getElementById('submitBtn');

    // Calculate Days Function
    function calculateDays() {
        const start = new Date(startDateInput.value);
        const end = new Date(endDateInput.value);

        if (startDateInput.value && endDateInput.value) {
            if (end < start) {
                durationDisplay.style.display = 'flex';
                durationDisplay.style.background = 'rgba(211, 47, 47, 0.1)';
                durationDisplay.style.borderColor = 'rgba(211, 47, 47, 0.2)';
                durationDisplay.style.color = '#d32f2f';
                daysCount.innerText = "Invalid Dates";
                submitBtn.disabled = true;
            } else {
                // Add +1 to include both start and end days
                const diffTime = Math.abs(end - start);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                
                durationDisplay.style.display = 'flex';
                durationDisplay.style.background = 'rgba(107, 182, 45, 0.1)';
                durationDisplay.style.borderColor = 'rgba(107, 182, 45, 0.2)';
                durationDisplay.style.color = 'var(--deep-green)';
                daysCount.innerText = diffDays + (diffDays === 1 ? " Day" : " Days");
                submitBtn.disabled = false;
            }
        } else {
            durationDisplay.style.display = 'none';
        }
    }

    // Listeners for Date Changes
    startDateInput.addEventListener('change', calculateDays);
    endDateInput.addEventListener('change', calculateDays);

    // Form Submission
    document.getElementById('leaveForm').onsubmit = function(e) {
        e.preventDefault();
        fetch("/leave", {
            method: "POST",
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                leaveType: document.getElementById('leaveType').value,
                startDate: startDateInput.value,
                endDate: endDateInput.value,
                reason: document.getElementById('reason').value,
                employeeEmail: sessionStorage.getItem("email"),
                status: "PENDING" // Default status on creation
            })
        }).then(() => {
            alert("Request submitted successfully!");
            window.location.href = "leavehistory.html";
        }).catch(err => {
            alert("Error submitting request. Please try again.");
            console.error(err);
        });
    };
</script>
</body>
</html>
