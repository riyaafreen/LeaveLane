<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard - LeaveLane</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=ranade@400,600,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --brand-green: #6BB62D; --deep-green: #1b4332; --bg: #f2ede0; --text-main: #1a2420; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; padding-bottom: 50px; }

        /* --- BACKGROUND ANIMATION --- */
        .bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .bg-grid { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background-image: linear-gradient(to right, rgba(27, 67, 50, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(27, 67, 50, 0.05) 1px, transparent 1px); background-size: 50px 50px; transform: rotate(-12deg); animation: gridShift 10s linear infinite; }
        .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; z-index: -1; }
        .blob-1 { width: 400px; height: 400px; background: var(--brand-green); top: -100px; left: -100px; }
        .blob-2 { width: 300px; height: 300px; background: var(--deep-green); bottom: -50px; right: -50px; }

        /* --- HEADER --- */
        header { padding: 40px 60px; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .brand-wrapper { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .brand { font-family: 'Ranade'; font-size: 28px; font-weight: 800; color: var(--deep-green); }
        
        .header-right { display: flex; align-items: center; gap: 15px; }
        #datetime { background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(27, 67, 50, 0.12); padding: 8px 20px; border-radius: 30px; color: #243029; font-size: 13px; font-weight: 600; backdrop-filter: blur(12px); box-shadow: 0 4px 15px rgba(27, 67, 50, 0.03); }
        .btn-logout { padding: 8px 20px; background: var(--deep-green); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.3s ease; }
        .btn-logout:hover { background: #82ca47; }

        /* --- GREETING & HEADING --- */
        .msg-area { max-width: 1200px; width: 90%; margin: 0 auto 10px auto; text-align: left; }
        #greeting { font-family: 'Ranade'; font-size: 32px; color: var(--deep-green); }
        .page-heading { text-align: center; font-family: 'Ranade'; font-size: 28px; color: var(--deep-green); margin-bottom: 20px; }

        /* --- DASHBOARD GRID LAYOUT --- */
        .dashboard-wrapper { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1200px; width: 90%; margin: 0 auto; }
        
        /* --- CONTENT CONTAINER (LEFT SIDE) --- */
        .page-container { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(255, 255, 255, 0.3); }

        /* --- SEARCH AND FILTER --- */
        .controls-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        .search-input, .filter-select { padding: 12px 18px; border-radius: 10px; border: 1px solid rgba(27, 67, 50, 0.2); font-size: 14px; outline: none; background: rgba(255, 255, 255, 0.8); }
        .search-input { flex: 1; transition: border 0.3s ease; }
        .search-input:focus { border-color: var(--brand-green); }
        .filter-select { width: 160px; color: var(--deep-green); font-weight: 500; cursor: pointer; }

        /* --- RIGHT SIDE WIDGETS --- */
        .side-panel { display: flex; flex-direction: column; gap: 20px; }
        .side-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        .profile-info { display: flex; align-items: center; gap: 15px; margin-top: 15px; margin-bottom: 20px; }
        .avatar { width: 45px; height: 45px; background: #6BB62D; border-radius: 50%; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid rgba(0,0,0,0.05); }
        .stat-box h4 { font-size: 14px; font-weight: 600; color: #1a2420; margin-bottom: 5px; }
        .stat-box p { font-size: 16px; color: #4a5568; }

        .urgent-item { padding: 12px; border-left: 4px solid #e81717; background: #fff5f5; margin-top: 15px; border-radius: 4px; }
        .urgent-item b { font-size: 13px; color: #1a2420; }
        .urgent-item span { font-size: 12px; color: #4a5568; display: block; margin-top: 4px; }

        /* --- PROFESSIONAL TABLE --- */
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; }
        th { background:#82ca47; color: var(--deep-green); padding: 16px; text-transform: uppercase; font-size: 12px; border-bottom: 2px solid rgba(226, 232, 240, 0.5); }
        td { padding: 18px; text-align: center; border-bottom: 1px solid rgba(0, 0, 0, 0.5); font-size: 14px; color: #1e293b; font-weight: 500; }
        tr:hover { background: rgba(255, 255, 255, 0.5); }

        /* --- STATUS PILLS & BUTTONS --- */
        .status-pill { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-PENDING { background: #fef3c7; color: #000000; }
        .status-APPROVED { background: #dcfce7; color: #000000; }
        .status-REJECTED { background: #fee2e2; color: #000000; }
        
        .approve-btn { background:#6BB62D; color: white; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; margin-right: 5px; transition: 0.2s; }
        .approve-btn:hover { background: #48cd36; }
        
        .reject-btn { background: #e81717; color: white; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s; }
        .reject-btn:hover { background: #b11a1a; }

        @keyframes gridShift { 0% { transform: rotate(-12deg) translate(0, 0); } 100% { transform: rotate(-12deg) translate(50px, 50px); } }
    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="bg-grid"></div>
</div>

<header>
    <a href="index.html" class="brand-wrapper" style="text-decoration:none;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6BB62D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <div class="brand">Leave<span style="font-style:italic; color:var(--brand-green)">Lane</span></div>
    </a>
    <div class="header-right">
        <div id="datetime">Connecting...</div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</header>

<main class="msg-area">
    <h1 id="greeting"></h1>
</main>

<h2 class="page-heading">Leave Requests</h2>

<div class="dashboard-wrapper">
    <section class="page-container">
        
        <div class="controls-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search by employee email..." onkeyup="filterTable()">
            <select id="statusFilter" class="filter-select" onchange="filterTable()">
                <option value="ALL">Status: All</option>
                <option value="PENDING">Pending</option>
                <option value="APPROVED">Approved</option>
                <option value="REJECTED">Rejected</option>
            </select>
        </div>

        <table id="leaveTable">
            <thead>
                <tr>
                    <th>ID</th><th>Employee Email</th><th>Leave Type</th>
                    <th>Start Date</th><th>End Date</th><th>Days</th><th>Reason</th>
                    <th>Status</th><th>Approve</th><th>Reject</th>
                </tr>
            </thead>
            <tbody id="leaveBody"></tbody>
        </table>
    </section>

    <aside class="side-panel">
        <div class="side-card">
            <h3>Manager Profile</h3>
            <div class="profile-info">
                <div class="avatar"></div>
                <div>
                    <p id="mName" style="font-weight: 700; font-size: 16px; color: var(--text-main);"></p>
                    <p id="mEmail" style="font-size: 13px; color: #4a5568;"></p>
                </div>
            </div>

            <h3 style="margin-top: 10px;">Statistics</h3>
            <div class="stat-grid">
                <div class="stat-box"><h4>Total</h4><p id="s-total">0</p></div>
                <div class="stat-box"><h4>Pending</h4><p id="s-pending">0</p></div>
                <div class="stat-box"><h4>Approved</h4><p id="s-approved">0</p></div>
                <div class="stat-box"><h4>Rejected</h4><p id="s-rejected">0</p></div>
            </div>
            
            <div style="width: 180px; margin: 0 auto;">
                <canvas id="leaveChart"></canvas>
            </div>
        </div>

        <div class="side-card">
            <h3>🚨 Action Required</h3>
            <div id="urgentList"></div>
        </div>
    </aside>
</div>

<script>
    if(sessionStorage.getItem("role") !== "MANAGER"){
        alert("Access Denied");
        window.location.href = "login.html";
    }

    // Dynamic Time Update
    function updateDateTime(){
        const now = new Date();
        document.getElementById("datetime").innerHTML = 
            now.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }) + 
            " | " + 
            now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    // --- Dynamic Name Extraction ---
    const hour = new Date().getHours();
    const email = sessionStorage.getItem("email") || "aly@company.com";
    
    // Extract "aly" from "aly@company.com" and capitalize it to "Aly"
    const rawName = email.split('@')[0];
    const name = rawName.charAt(0).toUpperCase() + rawName.slice(1);
    
    let greetingText = "Good Evening";
    if (hour < 12) greetingText = "Good Morning";
    else if (hour < 18) greetingText = "Good Afternoon";
    
    document.getElementById("greeting").innerText = `${greetingText}, ${name}!`;
    document.getElementById("mName").innerText = name;
    document.getElementById("mEmail").innerText = email;

    function approveLeave(id){
        fetch("/leave/approve/" + id, { method: "PUT" })
        .then(response => response.text())
        .then(data => { alert(data); location.reload(); });
    }

    function rejectLeave(id){
        fetch("/leave/reject/" + id, { method: "PUT" })
        .then(response => response.text())
        .then(data => { alert(data); location.reload(); });
    }

    let allLeaveData = []; 

    fetch("/leave")
    .then(response => response.json())
    .then(data => {
        allLeaveData = data; 
        renderTable(allLeaveData);

        // Sidebar Statistics Generation
        let p = 0, a = 0, r = 0;
        let urgentHtml = '';
        const today = new Date();

        data.forEach(leave => {
            if(leave.status === 'PENDING') p++;
            else if(leave.status === 'APPROVED') a++;
            else if(leave.status === 'REJECTED') r++;

            if(leave.status === 'PENDING') {
                const startDate = new Date(leave.startDate);
                const diffDays = Math.ceil((startDate - today) / (1000 * 60 * 60 * 24));
                if(diffDays <= 3 && diffDays >= 0) {
                    urgentHtml += `<div class="urgent-item"><b>${leave.employeeEmail}</b><span>Starts in ${diffDays} days</span></div>`;
                }
            }
        });

        // Update DOM Stats
        document.getElementById("s-total").innerText = data.length;
        document.getElementById("s-pending").innerText = p;
        document.getElementById("s-approved").innerText = a;
        document.getElementById("s-rejected").innerText = r;

        if (urgentHtml === '') urgentHtml = '<p style="font-size:13px; margin-top:15px; color:#4a5568;">No urgent requests.</p>';
        document.getElementById("urgentList").innerHTML = urgentHtml;

        // Initialize Pie Chart
        new Chart(document.getElementById("leaveChart"), {
            type: 'pie',
            data: { 
                labels: ['Pending', 'Approved', 'Rejected'], 
                datasets: [{ 
                    data: [p, a, r], 
                    backgroundColor: ['#82ca47', '#1b4332', '#c0f759'],
                    borderWidth: 2
                }] 
            },
            options: {
                plugins: {
                    legend: { position: 'top', labels: { boxWidth: 12, font: { size: 10 } } }
                }
            }
        });
    });

    // Renders the Table Data
    function renderTable(dataToRender) {
        let body = document.getElementById("leaveBody");
        body.innerHTML = ""; 

        dataToRender.forEach(leave => {
            // Calculate Leave Duration in Days
            const start = new Date(leave.startDate);
            const end = new Date(leave.endDate);
            const diffTime = Math.abs(end - start);
            const numberOfDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // +1 to make it inclusive

            let row = body.insertRow();
            row.innerHTML = `
                <td>#${leave.id}</td>
                <td>${leave.employeeEmail}</td>
                <td>${leave.leaveType}</td>
                <td>${leave.startDate}</td>
                <td>${leave.endDate}</td>
                <td><b>${numberOfDays}</b></td>
                <td style="text-align: left;">${leave.reason}</td>
                <td><span class="status-pill status-${leave.status.toUpperCase()}">${leave.status}</span></td>
                <td><button class="approve-btn" onclick="approveLeave(${leave.id})">Approve</button></td>
                <td><button class="reject-btn" onclick="rejectLeave(${leave.id})">Reject</button></td>
            `;
        });
    }

    // Search and Filter Logic
    function filterTable() {
        const searchQuery = document.getElementById("searchInput").value.toLowerCase();
        const statusFilter = document.getElementById("statusFilter").value;

        const filteredData = allLeaveData.filter(leave => {
            const matchesEmail = leave.employeeEmail.toLowerCase().includes(searchQuery);
            const matchesStatus = statusFilter === "ALL" || leave.status.toUpperCase() === statusFilter;
            return matchesEmail && matchesStatus;
        });

        renderTable(filteredData);
    }

    function logout(){
        sessionStorage.clear();
        window.location.href = "login.html";
    }
</script>
</body>
</html>
